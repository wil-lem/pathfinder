<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="HandheldFriendly" content="true">
  <meta name="description" content="Play Pathfinder online with friends and family.">
  <title>Pathfinder | Frontpage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&family=Righteous&display=swap" rel="stylesheet">

  <link rel="stylesheet" type="text/css" href="/assets/css/style.css">
  <link rel="stylesheet" type="text/css" href="/assets/vendor/fontawesome/css/all.min.css">

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      if (params.has('game')) {
        window.location.replace('/game?' + params.toString());
        return;
      }

      if (window.PathfinderI18n) {
        window.PathfinderI18n.initLanguageSwitcher('.language-select');
        window.PathfinderI18n.applyToDOM(document);
        window.PathfinderI18n.subscribe(function() {
          window.PathfinderI18n.applyToDOM(document);
        });
      }
    }, false);
  </script>
  <script src="/js/i18n.js"></script>

  <!-- Matomo -->
  <script>
    var _paq = window._paq = window._paq || [];
    /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
    (function() {
      var u="//matomo.modusoft.nl/";
      _paq.push(['setTrackerUrl', u+'matomo.php']);
      _paq.push(['setSiteId', '10']);
      var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
      g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
    })();
  </script>
  <!-- End Matomo Code -->
</head>
<body class="marketing-page">
  <main class="landing-shell">
    <header class="landing-nav">
      <div class="brand"><i class="fas fa-compass"></i> Pathfinder</div>
      <div class="nav-controls">
        <a class="rules-link" href="/rules" data-i18n="nav.howToPlay">How to play</a>
        <div class="language-switcher">
          <label for="language-select" data-i18n="language.label">Language</label>
          <select id="language-select" class="language-select" aria-label="Language selector">
            <option value="en">EN</option>
            <option value="nl">NL</option>
          </select>
        </div>
      </div>
    </header>

    <section class="hero-card">
      <p class="hero-kicker" data-i18n="landing.kicker">Card strategy game</p>
      <h1 data-i18n="landing.title">Find your path, outplay your friends.</h1>
      <p class="hero-text" data-i18n="landing.subtitle">Start a game in seconds, invite players with one link, and race through tactical rounds where every card matters.</p>

      <div class="card-parade" aria-hidden="true">
        <div class="promo-card card-color-red"><span class="mini-number">7</span><i class="animal fa fa-dragon"></i><span class="mini-number bottom">7</span></div>
        <div class="promo-card card-color-green"><span class="mini-number">5</span><i class="animal fa fa-frog"></i><span class="mini-number bottom">5</span></div>
        <div class="promo-card card-color-blue"><span class="mini-number">3</span><i class="animal fa fa-hippo"></i><span class="mini-number bottom">3</span></div>
        <div class="promo-card card-color-orange"><span class="mini-number">9</span><i class="animal fa fa-crow"></i><span class="mini-number bottom">9</span></div>
        <div class="promo-card card-color-black"><span class="mini-number">4</span><i class="animal fa fa-spider"></i><span class="mini-number bottom">4</span></div>
      </div>

      <div class="hero-actions">
        <a class="hero-button primary" href="/game"><i class="fas fa-hiking"></i> <span data-i18n="nav.startPlaying">Start Playing</span></a>
        <a class="hero-button ghost" href="/rules"><i class="fas fa-book-open"></i> <span data-i18n="landing.readRules">Read The Rules</span></a>
      </div>
    </section>
  </main>
</body>
</html>
