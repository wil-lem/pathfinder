<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="HandheldFriendly" content="true">
  <title>Pathfinder | Game</title>

  <script src="/js/i18n.js"></script>
  <script src="/js/vendor/socket.io/socket.io.js"></script>
  <script src="/js/Pathfinder.js"></script>
  <script src="/js/Interactions.js"></script>
  <script src="/js/states/BaseState.js"></script>
  <script src="/js/states/InitialState.js"></script>
  <script src="/js/states/InviteState.js"></script>
  <script src="/js/states/RoundState.js"></script>
  <script src="/js/widgets/Messages.js"></script>
  <script src="/js/widgets/Players.js"></script>
  <script src="/js/widgets/Card.js"></script>
  <script src="/js/widgets/ChooseFirstCard.js"></script>
  <script src="/js/widgets/NotifyFirstCard.js"></script>
  <script src="/js/widgets/Button.js"></script>
  <script src="/js/widgets/Modal.js"></script>
  <script src="/js/widgets/ScoreModal.js"></script>
  <script src="/js/widgets/GameRoundPlayers.js"></script>
  <script src="/js/widgets/Hand.js"></script>

  <link rel="stylesheet" type="text/css" href="/assets/css/style.css">
  <link rel="stylesheet" type="text/css" href="/assets/vendor/fontawesome/css/all.min.css">
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var languageSelect = document.querySelector('.language-select');
      if (window.PathfinderI18n) {
        window.PathfinderI18n.initLanguageSwitcher('.language-select');
        window.PathfinderI18n.applyToDOM(document);
        window.PathfinderI18n.subscribe(function() {
          window.PathfinderI18n.applyToDOM(document);
        });
      }
      if (languageSelect) {
        languageSelect.addEventListener('change', function() {
          window.location.reload();
        });
      }
      new Pathfinder();
    }, false);
  </script>
</head>
<body>
  <div class="game-language-switcher">
    <label for="game-language-select" data-i18n="language.label">Language</label>
    <select id="game-language-select" class="language-select" aria-label="Language selector">
      <option value="en">EN</option>
      <option value="nl">NL</option>
    </select>
  </div>
</body>
</html>
